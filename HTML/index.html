<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Paleta de Colores</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../CSS/style.css">
</head>
<body>
    <header>
        <h1>Generador</h1>
        <p>Elige el tamaño y crea tu paleta de colores única</p>
    </header>

    <main>
        <section class="controls" aria-labelledby="controls">
            <h2 id="controls">Controles</h2>
            <label for="paletteSize">Tamaño de la paleta:</label>
            <select id="paletteSize">
                <option value="6">6 colores</option>
                <option value="8">8 colores</option>
                <option value="9">9 colores</option>
            </select>
            <button id="generateBtn">Generar paleta</button>
            <button id="copyBtn">copiar código</button> 
        </section>

        <section id="palette" aria-live="polite"></section>
    </main>

    <footer>
        <p>Proyecto paletas de colores</p>
    </footer>

    <script src="../JS/script.js"></script>
</body>
</html>
